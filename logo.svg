<!--
  TrustCore logo (SVG)
  Dark background with cyan accents.  The circular motif represents a gate, 
  while the internal bars evoke control and continuity.  Text uses a modern,
  sans‑serif typeface.  Feel free to adjust colours in your application.
-->
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" aria-labelledby="trustcore-logo-title trustcore-logo-desc" role="img">
  <title id="trustcore-logo-title">TrustCore logo</title>
  <desc id="trustcore-logo-desc">A stylized circular gate with bars and the word TrustCore</desc>
  <!-- Background -->
  <rect width="400" height="120" fill="#0D0E10" />
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="#00B5C8" stroke-width="6" />
  <!-- Stylized T (vertical bar and horizontal top) -->
  <line x1="60" y1="35" x2="60" y2="85" stroke="#00B5C8" stroke-width="6" stroke-linecap="round" />
  <line x1="40" y1="35" x2="80" y2="35" stroke="#00B5C8" stroke-width="6" stroke-linecap="round" />
  <!-- Stylized C (partial circle to the right) -->
  <path d="M83 45 A20 20 0 1 1 83 75 L70 75 L70 45 Z" fill="#00B5C8" />
  <!-- Wordmark -->
  <text x="130" y="75" fill="#E6F5FA" font-family="Arial, Helvetica, sans-serif" font-size="40" letter-spacing="1">TrustCore</text>
</svg>